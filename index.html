<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>재가복지 평가 대비 퀴즈</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4338CA">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="재가복지 퀴즈">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');

:root{
  --primary:#3730A3;
  --primary-light:#6366F1;
  --primary-bg:#EEF2FF;
  --accent:#7C3AED;
  --success:#059669;
  --success-bg:#ECFDF5;
  --danger:#DC2626;
  --danger-bg:#FEF2F2;
  --warn:#D97706;
  --warn-bg:#FFFBEB;
  --text:#111827;
  --text-2:#4B5563;
  --text-3:#9CA3AF;
  --border:#E5E7EB;
  --card:#FFFFFF;
  --bg:#F1F4FF;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(55,48,163,.1),0 2px 6px rgba(0,0,0,.04);
  --shadow-lg:0 10px 30px rgba(55,48,163,.15),0 4px 10px rgba(0,0,0,.06);
  --radius-sm:10px;
  --radius-md:16px;
  --radius-lg:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
  background:var(--bg);
  min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(99,102,241,.08) 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 100%,rgba(124,58,237,.06) 0%,transparent 60%);
}
#app{max-width:480px;margin:0 auto;padding:0 4px}

/* ── 홈 ── */
.home{padding:.8rem .8rem 3rem}
.hdr{
  text-align:center;
  padding:1.4rem .5rem 1.6rem;
  position:relative;
}
.hdr::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,var(--primary) 0%,var(--accent) 100%);
  border-radius:0 0 var(--radius-lg) var(--radius-lg);
  margin:0 -4px;
  opacity:.07;
}
.hdr h1{
  font-size:22px;
  font-weight:800;
  color:var(--primary);
  letter-spacing:-.03em;
  margin-bottom:4px;
}
.hdr p{font-size:13px;color:var(--text-3);font-weight:500}

.tot{
  display:flex;align-items:center;gap:14px;
  background:var(--card);
  border-radius:var(--radius-md);
  padding:16px 18px;
  margin-bottom:1.2rem;
  box-shadow:var(--shadow-md);
  border:1px solid rgba(99,102,241,.08);
}
.tot-ico{font-size:28px}
.tot-info{flex:1}
.tot-lbl{font-size:12px;color:var(--text-3);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.tot-val{font-size:20px;font-weight:800;color:var(--primary);letter-spacing:-.02em;margin-top:1px}
.pbar{height:6px;background:var(--primary-bg);border-radius:3px;overflow:hidden;margin-top:7px}
.pfill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}

.dc{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:var(--radius-md);
  padding:14px 15px;
  margin-bottom:9px;
  display:flex;align-items:center;gap:13px;
  cursor:pointer;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  box-shadow:var(--shadow-sm);
}
.dc:not(.soon):active{transform:scale(.97);box-shadow:none}
.dc.done{border-color:#A7F3D0;background:linear-gradient(135deg,#F0FDF4,#ECFDF5)}
.dc.soon{opacity:.3;cursor:default}
.dc:not(.soon):not(.done):hover{
  border-color:var(--primary-light);
  box-shadow:var(--shadow-md);
  transform:translateY(-1px);
}
.dico{
  width:50px;height:50px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;
}
.di{flex:1;min-width:0}
.dn{font-size:11px;font-weight:700;color:var(--text-3);margin-bottom:2px;letter-spacing:.04em}
.dt{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ds{font-size:12px;color:var(--text-3);font-weight:500}
.dr{text-align:right;flex-shrink:0}
.dpg{font-size:14px;font-weight:700;color:var(--text);margin-bottom:5px}
.dg{font-size:11px;padding:3px 10px;border-radius:20px;white-space:nowrap;display:inline-block;font-weight:700;letter-spacing:.01em}
.gd{background:#D1FAE5;color:#065F46}
.gp{background:#DBEAFE;color:#1E40AF}
.gn{background:var(--primary-bg);color:var(--primary)}
.gs{background:#F3F4F6;color:#6B7280}

/* ── 퀴즈 ── */
.quiz{padding:.8rem .8rem 2.5rem}
.qnav{display:flex;align-items:center;gap:9px;margin-bottom:.9rem}
.bbtn{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  padding:9px 14px;
  font-size:14px;cursor:pointer;
  color:var(--primary);font-weight:700;
  transition:all .15s;
  font-family:inherit;
}
.bbtn:active{transform:scale(.96)}
.qi{flex:1}
.qd{font-size:11px;color:var(--text-3);font-weight:600;letter-spacing:.03em}
.qtit{font-size:13px;font-weight:700;color:var(--text);margin-top:1px}
.qc{
  font-size:14px;font-weight:800;
  color:var(--primary);
  white-space:nowrap;
  background:var(--primary-bg);
  padding:5px 11px;border-radius:20px;
  letter-spacing:-.01em;
}
.qc.rev{background:var(--warn-bg);color:var(--warn)}
.revbadge{
  font-size:11px;font-weight:700;color:var(--warn);
  background:var(--warn-bg);
  padding:4px 12px;border-radius:20px;
  margin-bottom:.6rem;display:inline-block;
  border:1px solid #FDE68A;
}
.qbar{height:5px;background:var(--primary-bg);border-radius:3px;overflow:hidden;margin-bottom:1rem}
.qfill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.qfill.rev{background:linear-gradient(90deg,var(--warn),#EF4444)}

.ill{border-radius:var(--radius-md);overflow:hidden;margin-bottom:.9rem;line-height:0;box-shadow:var(--shadow-sm)}
.ill svg{display:block;width:100%}

.sit{
  background:var(--card);
  border-radius:var(--radius-md);
  padding:14px 16px;
  margin-bottom:12px;
  font-size:14.5px;color:var(--text-2);
  line-height:1.85;
  border:1.5px solid var(--border);
  box-shadow:var(--shadow-sm);
}
.sit strong{color:var(--primary);font-weight:700}

.qt{font-size:17px;font-weight:800;color:var(--text);line-height:1.55;margin-bottom:14px;letter-spacing:-.02em}
.ops{display:flex;flex-direction:column;gap:9px}
.op{
  border:1.5px solid var(--border);
  border-radius:var(--radius-md);
  padding:14px 15px;
  font-size:14.5px;color:var(--text);
  cursor:pointer;text-align:left;
  background:var(--card);
  line-height:1.6;
  display:flex;align-items:flex-start;gap:11px;
  width:100%;
  transition:all .18s cubic-bezier(.4,0,.2,1);
  box-shadow:var(--shadow-sm);
  font-family:inherit;font-weight:500;
}
.op:not(.dis):active{transform:scale(.985);box-shadow:none}
.op:not(.dis):hover{border-color:var(--primary-light);box-shadow:var(--shadow-md)}
.on{
  width:28px;height:28px;border-radius:50%;
  background:var(--primary-bg);color:var(--primary);
  font-size:13px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px;
  transition:all .18s;
}
.op.oc{background:linear-gradient(135deg,#F0FDF4,#ECFDF5);border-color:#6EE7B7;color:#065F46}
.op.oc .on{background:var(--success);color:#fff}
.op.ow{background:linear-gradient(135deg,#FEF2F2,#FFF1F1);border-color:#FCA5A5;color:#991B1B}
.op.ow .on{background:var(--danger);color:#fff}
.op.dis{cursor:default;pointer-events:none}

.fbx{margin-top:12px;border-radius:var(--radius-md);padding:15px 17px;display:none}
.fbx.sh{display:block;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fbx.ok{background:linear-gradient(135deg,#F0FDF4,#ECFDF5);border:1.5px solid #6EE7B7}
.fbx.no{background:linear-gradient(135deg,#FEF2F2,#FFF1F1);border:1.5px solid #FCA5A5}
.fb-key{font-size:11px;font-weight:800;color:var(--primary);margin:12px 0 4px;letter-spacing:.06em;text-transform:uppercase}
.fb-key:first-child{margin-top:0}
.fb-point{font-size:14px;color:var(--text);font-weight:700;line-height:1.65}
.fb-point strong{color:var(--danger);font-weight:800}
.fb-sub{font-size:13px;color:var(--text-2);line-height:1.75;margin-top:4px;font-weight:500}
.fb-ex{
  font-size:13px;color:var(--text-2);line-height:1.8;
  background:rgba(99,102,241,.06);
  padding:11px 14px;border-radius:10px;margin-top:6px;
  border-left:3px solid var(--primary-light);
  font-weight:500;
}
.qquote{
  display:block;margin:6px 0;
  padding:10px 13px;
  background:rgba(55,48,163,.06);
  border-left:3px solid var(--primary);
  border-radius:0 10px 10px 0;
  font-size:13px;color:#3730A3;
  font-style:italic;line-height:1.8;font-weight:500;
}

.rtbtn{
  margin-top:10px;width:100%;padding:14px;
  border-radius:var(--radius-md);
  border:1.5px solid #FCA5A5;
  background:var(--card);color:var(--danger);
  font-size:15px;font-weight:700;cursor:pointer;
  display:none;transition:all .15s;font-family:inherit;
}
.rtbtn.sh{display:block}.rtbtn:active{transform:scale(.98)}

.nb{
  margin-top:12px;width:100%;padding:16px;
  border-radius:var(--radius-md);border:none;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;font-size:16px;font-weight:800;
  cursor:pointer;display:none;
  box-shadow:0 6px 20px rgba(55,48,163,.35);
  transition:all .18s cubic-bezier(.4,0,.2,1);
  letter-spacing:-.01em;font-family:inherit;
}
.nb.sh{display:block}
.nb:active{transform:scale(.98);box-shadow:0 2px 8px rgba(55,48,163,.25)}
.nb.rev{
  background:linear-gradient(135deg,var(--warn),#EF4444);
  box-shadow:0 6px 20px rgba(239,68,68,.3);
}

.prevbtn{
  margin-top:8px;width:100%;padding:12px;
  border-radius:var(--radius-md);
  border:1.5px solid var(--border);
  background:var(--card);color:var(--text-3);
  font-size:14px;font-weight:600;cursor:pointer;
  display:none;transition:all .15s;font-family:inherit;
}
.prevbtn.sh{display:block}.prevbtn:active{transform:scale(.98)}

/* ── 완료 화면 ── */
.donew{text-align:center;padding:2.5rem 1rem}
.de{font-size:56px;margin-bottom:12px;display:block;animation:bounce .6s ease}
@keyframes bounce{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.dt2{font-size:22px;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-.03em}
.ds2{font-size:48px;font-weight:800;color:var(--primary);margin:12px 0 6px;letter-spacing:-.04em}
.dm{font-size:14px;color:var(--text-3);line-height:1.75;margin-bottom:20px;font-weight:500}
.wrong-box{
  background:linear-gradient(135deg,#FEF2F2,#FFF1F1);
  border:1.5px solid #FCA5A5;
  border-radius:var(--radius-md);
  padding:14px 18px;margin-bottom:14px;text-align:center;
}
.wrong-cnt{font-size:16px;font-weight:800;color:var(--danger);margin-bottom:4px}
.wrong-sub{font-size:13px;color:var(--text-3);font-weight:500}
.hb{
  width:100%;padding:14px;
  border-radius:var(--radius-md);
  border:2px solid var(--primary);
  background:var(--card);color:var(--primary);
  font-size:15px;font-weight:700;cursor:pointer;
  margin-bottom:9px;transition:all .15s;font-family:inherit;
}
.hb:active{transform:scale(.98)}
.hb:hover{background:var(--primary-bg)}
.hb.rev{border-color:var(--warn);color:var(--warn)}
.hb.rev:hover{background:var(--warn-bg)}
.hb.sec{border-color:var(--border);color:var(--text-3);font-weight:600}
.hb.sec:hover{background:#F9FAFB}

.revdone-box{
  background:linear-gradient(135deg,var(--warn-bg),#FFF7ED);
  border:1.5px solid #FDE68A;
  border-radius:var(--radius-md);
  padding:18px;margin-bottom:16px;
}
.revdone-txt{font-size:15px;color:var(--warn);font-weight:700;line-height:1.7}
</style>
</head>
<body>
<div id="app"></div>

{sc:'record',sit:'요양보호사가 급여제공기록지에 상태변화를 <strong>\'전날과 비교해서\'</strong> 체크하고 있습니다.',q:'이 비교 기준이 맞을까요?',opts:['맞다. 매일 방문하니 전날 비교가 가장 정확하다','틀리다. 지난달 또는 주단위로 비교해야 한다','센터 자체 운영기준으로 정하면 되므로 전날 비교도 가능하다'],ans:1,ok:mkOk('전날 비교는 부적절합니다. 최소 주단위, 사회복지사 일지와 맞추려면 <strong>지난달 대비</strong>입니다.','','"전날과 비교해서 말이 안돼요. 유지호조는 어떻게 전날과 비교를 합니까? 최소한 주단위까지... 사회복지사업무수행일지하고 맞추려면 지난달과 비교해서."','<span style="font-size:11px;background:#E0E7FF;color:#4338CA;padding:2px 8px;border-radius:8px;font-weight:700;display:inline-block;margin-bottom:5px">📋 상태변화 기록</span><br>"<b style="color:#C53030">지난달 대비</b> 보행 상태 유지됨"<br>"<b style="color:#C53030">지난달과 비교하여</b> 배변 실수 빈도 증가함"')},
{sc:'record',sit:'급여제공기록지에 <strong>\'소리 지르신다\'</strong>, <strong>\'편하게 주무신다\'</strong>라고만 기록했습니다.',q:'이 기록, 잘 쓴 것일까요?',opts:['잘 썼다. 어르신 상태를 정확히 기록했다','잘 썼다. 간결한 기록이 더 좋다','부족하다. 상태만 있고 조치와 결과가 없다'],ans:2,ok:mkOk('상태만 쓰면 부족합니다. <strong>상태 → 조치 → 결과</strong> 3가지가 반드시 한 줄에 있어야 합니다.','','"먹을 거 찾으신다, 소리 지르신다, 편하게 주무신다 등 상태만 적고 제공 내용과 결과가 결여된 사례는 부적절하다."','<span style="font-size:11px;background:#E0E7FF;color:#4338CA;padding:2px 8px;border-radius:8px;font-weight:700;display:inline-block;margin-bottom:5px">📋 급여제공기록지</span><br>"몸이 찌뿌둥하다 하셔서 <b style="color:#C53030">(상태)</b> 주물러 드리니 <b style="color:#C53030">(조치)</b> 시원하고 고맙다고 하셨음 <b style="color:#C53030">(결과)</b>"<br>"기력 없으셔서 <b style="color:#C53030">(상태)</b> 죽을 해드리니 <b style="color:#C53030">(조치)</b> 다 드시고 좋다고 하셨음 <b style="color:#C53030">(결과)</b>"')},
{sc:'desk',sit:'이번달 방문했더니 어르신에게 <strong>특별한 변화나 요구가 없었습니다.</strong> 조치사항란이 비어 있습니다.',q:'조치사항란을 어떻게 처리해야 할까요?',opts:['변화가 없다는 뜻이므로 빈칸이 오히려 더 정직한 기록이다','억지로라도 조치사항을 만들어 쓴다','정해진 문구로 간단히 채운다'],ans:2,ok:mkOk('<strong>변화 없을 때 → 정해진 문구</strong>로 채우는 것이 좋습니다.','','"수급자의 상태 및 욕구의 변화가 없으므로 계획에 따라 서비스 제공 이렇게 쓰면 되잖아요."','<span style="font-size:11px;background:#E0E7FF;color:#4338CA;padding:2px 8px;border-radius:8px;font-weight:700;display:inline-block;margin-bottom:5px">📋 조치사항란</span><br>"수급자의 <b style="color:#C53030">상태 및 욕구의 변화가 없으므로</b> <b style="color:#C53030">계획에 따라 서비스 제공</b>"')},
{sc:'visit',sit:'어르신 보행 상태가 악화됐습니다. 기록지에 <strong>\'보행 악화됨\'</strong>이라고만 썼습니다.',q:'이 기록으로 충분할까요?',opts:['충분하다. 악화됐다는 사실이 중요하다','부족하다. 지난달 대비 구체적 변화를 기술해야 한다','악화 사실만 기록하면 되고 구체적 변화 내용은 계획서에 기재하면 된다'],ans:1,ok:mkOk('"악화됨"만으로는 부족합니다. <strong>지난달 대비 구체적으로 비교</strong>해서 기술해야 합니다.','','"지난달에 보행기를 가지고 거동이 가능했으나 감기몸살을 앓은 후 구축을 받아야 보행이 가능하심. 악화됐다면 그렇게 써줘야 되겠죠."','<span style="font-size:11px;background:#E0E7FF;color:#4338CA;padding:2px 8px;border-radius:8px;font-weight:700;display:inline-block;margin-bottom:5px">📋 업무수행일지 상태변화</span><br>"<b style="color:#C53030">지난달에는</b> 보행기로 자립보행이 가능하셨으나, <b style="color:#C53030">이번달에는</b> 감기몸살 이후 <b style="color:#C53030">부축을 받아야 보행이 가능</b>하심"')}

{sc:'mtg',sit:'복잡한 상황이라 <strong>사례회의를 통해 해결</strong>하려 합니다. 방문상담일지 <strong>향후계획란</strong>을 작성 중입니다.',q:'향후계획란에 어떻게 써야 할까요?',opts:['추후 논의 예정이라고만 쓴다','사례회의를 통해 해결 예정이라고 명기한다','구체적 방법 명기는 불필요하다. "복합 문제 검토 중"으로만 써도 충분하다'],ans:1,ok:mkOk('<strong>사례회의 예정 → 향후계획란에 반드시 명기</strong>해야 합니다.','','사례회의를 통해 해결하기로 했다면 방문상담일지 향후계획 항목에 이를 기재해야 추후 근거가 됩니다.','<span style="font-size:11px;background:#E0E7FF;color:#4338CA;padding:2px 8px;border-radius:8px;font-weight:700;display:inline-block;margin-bottom:5px">📋 방문상담일지 향후계획</span><br>"향후계획: <b style="color:#C53030">사례회의를 통해</b> 환경개선 방안 논의 및 <b style="color:#C53030">지원체계 연계 예정</b>"')},

{sc:'svgMailbox',sit:'급여제공기록지를 <strong>우편으로 발송</strong>하면서 교부일자와 수령자 서명을 받았습니다.',q:'추가로 필요한 것이 있을까요?',opts:['없다. 교부일자와 서명으로 충분하다','우편 발송 시 우편물관리대장을 작성해야 한다','우편 영수증을 보관하면 된다'],ans:1,ok:mkOk('<strong>우편 발송 → 우편물관리대장 작성 필수</strong>','','우편으로 발송한 경우에는 우편물관리대장을 별도로 작성해서 관리해야 합니다.',null)},
{sc:'svgFamilyCare',sit:'<strong>가족요양</strong>을 받고 있는 수급자에게 급여제공기록지를 교부하지 않았습니다.',q:'이것이 문제가 될까요?',opts:['문제된다. 모든 수급자에게 교부 의무가 있다','문제되지 않는다. 가족요양 수급자는 교부 의무가 없다','가족에게 교부하면 수급자 교부로 인정된다'],ans:1,ok:mkOk('<strong>가족요양 수급자 → 교부 의무 없음</strong>','','가족요양을 받는 수급자에 대해서는 급여제공기록지 교부 의무가 적용되지 않습니다.',null)},
{sc:'svgCheckup',sit:'요양보호사가 제출한 <strong>건강검진 결과서</strong>를 확인하고 있습니다.',q:'무엇을 확인해야 할까요?',opts:['검진 기관의 인증 여부만 확인하면 된다','발행일자와 항목 충족 여부를 확인해야 한다','요양보호사 자필 서명이 있는지 확인한다'],ans:1,ok:mkOk('<strong>건강검진 → 발행일자 + 항목 충족 여부 확인 필수</strong>','','검진 기관 인증보다 발행일자가 서비스 개시일 기준에 맞는지, 필요 항목이 모두 포함됐는지 확인해야 합니다.',null)}
];

const QDB={1:D1,2:D2,3:D3,4:D4,5:D5,6:D6,7:D7,8:D8,9:D9,10:D10};

// ── 상태 ────────────────────────────────────
var screen='home',curDay=1,curQ=0,sessAns=[],progData={},qAnswered=false;
var wrongQs=[],reviewMode=false,reviewIdx=0,qStates=[],rqStates=[];

function loadP(){try{var s=localStorage.getItem('rqz_p');if(s)progData=JSON.parse(s);}catch(e){}}
function saveP(){try{localStorage.setItem('rqz_p',JSON.stringify(progData));}catch(e){}}
function doneQ(){return DAYS.reduce(function(s,d){var p=progData[d.d];return s+(p?p.done:0);},0);}
function totalQ(){return DAYS.reduce(function(s,d){return s+d.n;},0);}

// ── 홈화면 ───────────────────────────────────
function renderHome(){
  var done=doneQ(),total=totalQ(),pct=Math.round(done/total*100);
  var cards=DAYS.map(function(d){
    var p=progData[d.d]||{done:0};
    var isDone=p.done>=d.n,isIn=p.done>0&&!isDone,isSoon=!d.ready;
    var badge,cls;
    if(isSoon){badge='<span class="dg gs">곧 추가 예정</span>';cls='dc soon';}
    else if(isDone){badge='<span class="dg gd">✅ 완료</span>';cls='dc done';}
    else if(isIn){badge='<span class="dg gp">진행중</span>';cls='dc';}
    else{badge='<span class="dg gn">미시작</span>';cls='dc';}
    var pg=isSoon?'—':(p.done||0)+'/'+d.n;
    var oc=!isSoon?'onclick="startDay('+d.d+')"':'';
    return'<div class="'+cls+'" '+oc+'><div class="dico" style="background:'+d.bg+'">'+d.e+'</div>'
      +'<div class="di"><div class="dn">'+d.d+'일차</div><div class="dt">'+d.t+'</div><div class="ds">'+d.s+'</div></div>'
      +'<div class="dr"><div class="dpg">'+pg+'</div>'+badge+'</div></div>';
  }).join('');
  document.getElementById('app').innerHTML='<div class="home"><div class="hdr"><h1>📚 재가복지 평가 대비</h1><p>구청 평가 기준 완벽 이해하기</p></div>'
    +'<div class="tot"><div class="tot-ico">🎯</div><div class="tot-info"><div class="tot-lbl">전체 진도</div>'
    +'<div class="tot-val">'+done+' / '+total+'문제 완료</div>'
    +'<div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div></div></div>'+cards+'</div>';
}

// ── 문제화면 ─────────────────────────────────
function renderQ(){
  var day=DAYS.find(function(d){return d.d===curDay;});
  var q,qTotal,qCur,isRev=reviewMode;
  if(isRev){q=QDB[curDay][wrongQs[reviewIdx]];qTotal=wrongQs.length;qCur=reviewIdx+1;}
  else{q=QDB[curDay][curQ];qTotal=day.n;qCur=curQ+1;}
  qAnswered=false;
  var pct=Math.round((qCur-1)/qTotal*100);
  var hasPrev=isRev?reviewIdx>0:curQ>0;
  var ops=q.opts.map(function(o,i){return'<button class="op" onclick="answer('+i+','+q.ans+')"><span class="on">'+['①','②','③'][i]+'</span><span>'+o+'</span></button>';}).join('');
  var revBadge=isRev?'<div style="margin-bottom:.5rem"><span class="revbadge">🔁 오답 복습 중</span></div>':'';
  var nbLabel=isRev?(reviewIdx<wrongQs.length-1?'다음 문제 →':'복습 완료 →'):(curQ<day.n-1?'다음 문제 →':'결과 보기 →');
  var nbCls=isRev?'nb rev':'nb';
  document.getElementById('app').innerHTML='<div class="quiz">'
    +revBadge
    +'<div class="qnav"><button class="bbtn" onclick="goHome()">← 홈</button>'
    +'<div class="qi"><div class="qd">'+curDay+'일차</div><div class="qtit">'+day.t+'</div></div>'
    +'<div class="qc'+(isRev?' rev':'')+'">'+qCur+' / '+qTotal+'</div></div>'
    +'<div class="qbar"><div class="qfill'+(isRev?' rev':'')+'" style="width:'+pct+'%"></div></div>'
    +'<div class="ill">'+SC[q.sc]()+'</div>'
    +'<div class="sit">'+q.sit+'</div>'
    +'<div class="qt">'+q.q+'</div>'
    +'<div class="ops">'+ops+'</div>'
    +'<div class="fbx" id="fbx"></div>'
    +'<button class="rtbtn" id="rtbtn" onclick="retryQ()">🔄 다시 풀어볼까요?</button>'
    +'<button class="'+nbCls+'" id="nb" onclick="nextQ()">'+nbLabel+'</button>'
    +(hasPrev?'<button class="prevbtn sh" onclick="prevQ()">← 이전 문제</button>':'')
    +'</div>';
  restoreState();
}

function restoreState(){
  var st=reviewMode?rqStates[reviewIdx]:qStates[curQ];
  if(!st||!st.done)return;
  qAnswered=true;
  var q=reviewMode?QDB[curDay][wrongQs[reviewIdx]]:QDB[curDay][curQ];
  var btns=document.querySelectorAll('.op');
  btns.forEach(function(b,i){b.classList.add('dis');if(i===q.ans)b.classList.add('oc');else if(i===st.chosen&&!st.ok)b.classList.add('ow');});
  var fb=document.getElementById('fbx');
  fb.innerHTML='<div style="font-size:15px;font-weight:700;color:#276749;margin-bottom:8px">✅ 정답입니다!</div>'+q.ok;
  fb.className='fbx sh ok';
  document.getElementById('nb').className=(reviewMode?'nb rev':'nb')+' sh';
}

// ── 완료화면 ─────────────────────────────────
function renderDone(){
  var day=DAYS.find(function(d){return d.d===curDay;});
  var c=sessAns.filter(function(a){return a;}).length,t=day.n,pct=Math.round(c/t*100);
  var e,m;
  if(pct===100){e='🏆';m='완벽합니다! 모든 문제를 맞히셨어요!';}
  else if(pct>=70){e='🌟';m='잘 하셨어요! 틀린 문제를 복습해보세요.';}
  else{e='💪';m='한 번 더 도전해보세요. 반복이 실력입니다!';}
  var wrongBox='';
  if(wrongQs.length>0){
    wrongBox='<div class="wrong-box"><div class="wrong-cnt">❌ 틀린 문제 '+wrongQs.length+'개</div>'
      +'<div class="wrong-sub">한 번이라도 틀린 문제들을 모아서 다시 풀어볼 수 있습니다.</div></div>'
      +'<button class="hb rev" onclick="startReview()">🔁 오답 복습하기</button>';
  }
  document.getElementById('app').innerHTML='<div class="quiz"><div class="donew">'
    +'<div class="de">'+e+'</div>'
    +'<div class="dt2">'+curDay+'일차 완료!</div>'
    +'<div class="ds2">'+c+' / '+t+'</div>'
    +'<div class="dm">'+m+'</div>'
    +wrongBox
    +'<button class="hb sec" onclick="startDay('+curDay+')">🔄 처음부터 다시 풀기</button>'
    +'<button class="hb sec" onclick="goHome()">← 홈으로 돌아가기</button>'
    +'</div></div>';
}

// ── 오답복습 완료화면 ────────────────────────
function renderRevDone(){
  document.getElementById('app').innerHTML='<div class="quiz"><div class="donew">'
    +'<div class="de">✨</div>'
    +'<div class="dt2">오답 복습 완료!</div>'
    +'<div class="revdone-box"><div class="revdone-txt">틀렸던 '+wrongQs.length+'문제를 다시 풀었습니다.<br>수고하셨어요! 💪</div></div>'
    +'<button class="hb rev" onclick="startReview()">🔁 오답 한 번 더 풀기</button>'
    +'<button class="hb sec" onclick="goHome()">← 홈으로 돌아가기</button>'
    +'</div></div>';
}

function render(){
  if(screen==='home')renderHome();
  else if(screen==='question')renderQ();
  else if(screen==='done')renderDone();
  else if(screen==='revdone')renderRevDone();
}

// ── 액션 ─────────────────────────────────────
function startDay(d){
  curDay=d;curQ=0;sessAns=[];wrongQs=[];
  reviewMode=false;reviewIdx=0;
  qStates=[];rqStates=[];
  screen='question';render();
}

function startReview(){
  reviewMode=true;reviewIdx=0;rqStates=[];
  screen='question';render();
}

function answer(chosen,correct){
  if(qAnswered)return;
  var btns=document.querySelectorAll('.op');
  if(chosen!==correct){
    btns[chosen].classList.add('ow','dis');
    // 오답 기록 (일반 모드에서만)
    if(!reviewMode&&wrongQs.indexOf(curQ)===-1)wrongQs.push(curQ);
    var fb=document.getElementById('fbx');
    fb.innerHTML='<div style="font-size:15px;font-weight:700;color:#9B2C2C;margin-bottom:5px">❌ 오답입니다.</div><div style="font-size:14px;color:#9B2C2C">다시 한번 생각해보세요!</div>';
    fb.className='fbx sh no';
    document.getElementById('rtbtn').className='rtbtn sh';
    return;
  }
  qAnswered=true;
  btns.forEach(function(b,i){b.classList.add('dis');if(i===correct)b.classList.add('oc');});
  // 상태 저장
  var st={done:true,chosen:chosen,ok:true};
  if(reviewMode){rqStates[reviewIdx]=st;}
  else{sessAns[curQ]=true;qStates[curQ]=st;}
  var fb=document.getElementById('fbx'),q=QDB[curDay][reviewMode?wrongQs[reviewIdx]:curQ];
  fb.innerHTML='<div style="font-size:15px;font-weight:700;color:#276749;margin-bottom:8px">✅ 정답입니다!</div>'+q.ok;
  fb.className='fbx sh ok';
  document.getElementById('nb').className=(reviewMode?'nb rev':'nb')+' sh';
  document.getElementById('rtbtn').className='rtbtn';
}

function retryQ(){
  document.querySelectorAll('.op').forEach(function(b){b.classList.remove('ow','oc','dis');});
  document.getElementById('fbx').className='fbx';
  document.getElementById('rtbtn').className='rtbtn';
}

function prevQ(){
  if(reviewMode){
    if(reviewIdx>0){reviewIdx--;render();}
  }else{
    if(curQ>0){curQ--;render();}
  }
}

function nextQ(){
  var day=DAYS.find(function(d){return d.d===curDay;});
  if(reviewMode){
    reviewIdx++;
    if(reviewIdx>=wrongQs.length){screen='revdone';render();}
    else{render();}
  }else{
    curQ++;
    if(curQ>=day.n){
      progData[curDay]={done:day.n,correct:sessAns.filter(function(a){return a;}).length};
      saveP();screen='done';render();
    }else{render();}
  }
}

function goHome(){reviewMode=false;screen='home';render();}

loadP();render();

// PWA Service Worker 등록
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      console.log('SW registered');
    }).catch(function(e){console.log('SW error',e);});
  });
}
</script>
</body>
</html>
